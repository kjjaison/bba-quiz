name: bba_quiz
description: BBA Dublin Bible Quiz - Flutter app using the same Google Sheet backend
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.10.0
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.3
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/app_icon.jpg
  adaptive_icon_background: "#1A365D"
  adaptive_icon_foreground: assets/icon/app_icon.jpg
  web:
    generate: true
    image_path: assets/icon/app_icon.jpg
    background_color: "#1A365D"
    theme_color: "#1A365D"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.jpg
